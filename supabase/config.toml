[functions.process-email-queue]
verify_jwt = true

# Sends real branded emails to an arbitrary recipient — must never be public.
# Only service-role callers (other edge functions) may invoke this.
[functions.send-transactional-email]
verify_jwt = true

[functions.handle-email-unsubscribe]
verify_jwt = false

[functions.handle-email-suppression]
verify_jwt = false

# --- payments / tracking / admin ---

# Main request form endpoint. Invoked from the browser with the anon key (a
# valid JWT), so verify_jwt = true still lets the public form through while
# rejecting unauthenticated (no-JWT) calls. Declared explicitly so every
# deployed function's exposure is visible in one place.
[functions.submit-xenium-request]
verify_jwt = true

# Webhook endpoint hit by Razorpay servers — must be public (no JWT).
# Authentication happens via X-Razorpay-Signature header inside the function.
[functions.razorpay-webhook]
verify_jwt = false

# Public lookup; protected by (code + email) and optional OTP.
[functions.track-order]
verify_jwt = false
[functions.verify-tracking-otp]
verify_jwt = false

# Public polling fallback used by the tracking page.
[functions.check-payment-status]
verify_jwt = false

# Public gated reveal — releases the embedded URL only after timer + password
# (own auth by token, not JWT).
[functions.reveal-order]
verify_jwt = false

# Public post-delivery edit request — gated by (code + email) and a 24h window.
[functions.request-edit]
verify_jwt = false

# Frontend calls this right after submission with anon JWT.
[functions.create-payment-link]
verify_jwt = false

# Admin endpoints: verify_jwt = true; the function additionally checks
# admin_users membership before returning data.
[functions.admin-orders]
verify_jwt = true

# Public stats counter (delivered orders).
[functions.get-public-stats]
verify_jwt = false
